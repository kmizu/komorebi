name: Scala Server CI

on:
  push:
    branches: [main]
    paths:
      - 'komorebi-server/**'
      - '.github/workflows/scala-server.yml'
  pull_request:
    branches: [main]
    paths:
      - 'komorebi-server/**'
      - '.github/workflows/scala-server.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: komorebi-server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: sbt/setup-sbt@v1

      - name: Compile
        run: sbt compile

      - name: Test
        run: sbt test

      - name: Coverage report
        run: sbt coverage test coverageReport
        continue-on-error: true

      - name: Print coverage
        if: always()
        run: |
          REPORT=$(find target -name "scoverage.xml" | head -1)
          if [ -n "$REPORT" ]; then
            COVERAGE=$(grep -oP 'statement-rate="\K[^"]+' "$REPORT" | head -1)
            echo "Statement coverage: ${COVERAGE}%"
          fi
