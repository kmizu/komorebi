name: Scala Server CI

on:
  push:
    branches: [main]
    paths:
      - 'komorebi-server/**'
      - '.github/workflows/scala-server.yml'
  pull_request:
    branches: [main]
    paths:
      - 'komorebi-server/**'
      - '.github/workflows/scala-server.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: komorebi-server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: sbt

      - name: Compile
        run: sbt compile

      - name: Test
        run: sbt test

      - name: Coverage
        run: sbt coverage test coverageReport

      - name: Check coverage threshold (80%)
        run: |
          REPORT=$(find target -name "scoverage.xml" | head -1)
          if [ -z "$REPORT" ]; then
            echo "No coverage report found, skipping threshold check"
            exit 0
          fi
          COVERAGE=$(grep -oP 'statement-rate="\K[^"]+' "$REPORT" | head -1)
          echo "Statement coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 80" | bc)" -eq 1 ]; then
            echo "Coverage ${COVERAGE}% is below 80% threshold"
            exit 1
          fi
